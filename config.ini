# CubeWizard Configuration File
# Modify these settings to customize the behavior of CubeWizard

[openai]
# OpenAI model to use for image processing with structured outputs
# vision_model = gpt-5-nano-2025-08-07
vision_model = gpt-5-mini-2025-08-07
# vision_model = gpt-5-2025-08-07

# Maximum tokens for vision API responses
max_tokens = 20000

# Image detail level: low, high, auto
image_detail = high

# Reasoning effort level: low, medium, high
reasoning_effort = medium

[scryfall]
# Scryfall API settings
# Rate limit delay between requests (seconds)
rate_limit_delay = 0.1

# Batch size for collection requests
collection_batch_size = 75

[output]
# Output directory settings
output_directory = output
create_subdirectories = true
include_timestamp = true

# Subdirectory names
card_lists_dir = card_lists
enriched_data_dir = enriched_data
cube_data_dir = cube_data

# File formats
save_json = true
save_txt_report = true
save_csv_export = false

# Contextual information
expected_deck_size = 40

[image_processing]
# Image processing settings
max_image_width = 4000
max_image_height = 4000
image_quality = 100

# Card detection sensitivity settings
use_multi_pass_detection = true
multi_pass_expected_miss_rate = 0.25
enable_validation_pass = true

[cubecobra]
# CubeCobra API settings
api_timeout = 10
max_cards_in_prompt = 1000

[api]
# General API settings
user_agent = CubeWizard/1.0

[model assumptions]
# Statistical parameters for metric generation
laplace_smoothing_weight = 5