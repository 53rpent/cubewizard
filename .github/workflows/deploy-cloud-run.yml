name: Deploy Cloud Run services

# Requires Actions secret ENQUEUE_SHARED_SECRET_PROD (same as Wrangler ENQUEUE_SHARED_SECRET --env prod).

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

env:
  PROJECT_ID: cubewizard
  REGION: us-east1
  AR_REPO: cubewizard

  ENQUEUE_SERVICE: cubewizard-enqueue
  WORKER_SERVICE: cubewizard-worker

  ENQUEUE_IMAGE: us-east1-docker.pkg.dev/cubewizard/cubewizard/enqueue
  WORKER_IMAGE: us-east1-docker.pkg.dev/cubewizard/cubewizard/worker

  # Runtime service accounts (create these once in GCP IAM).
  # If you choose different emails, update these strings to match.
  ENQUEUE_RUNTIME_SA: enqueue-sa@cubewizard.iam.gserviceaccount.com
  WORKER_RUNTIME_SA: worker-sa@cubewizard.iam.gserviceaccount.com

  # Prod queue + Firestore upload-status (must match GCP console / docs)
  CLOUD_TASKS_QUEUE: eval-queue
  FIRESTORE_DATABASE_ID: cw-upload-status
  FIRESTORE_COLLECTION: jobs
  TASK_OIDC_SERVICE_ACCOUNT: cloudtasks-invoker-sa@cubewizard.iam.gserviceaccount.com

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # One-time setup required in GCP:
      # - Create a Workload Identity Provider for GitHub OIDC
      # - Create a service account that can push to Artifact Registry + deploy Cloud Run
      # - Grant roles to that service account (see README guidance)
      - name: Authenticate to Google Cloud (OIDC)
        uses: google-github-actions/auth@v2
        with:
          # TODO: set these GitHub repository secrets:
          #   GCP_WORKLOAD_IDENTITY_PROVIDER: projects/<num>/locations/global/workloadIdentityPools/<pool>/providers/<provider>
          #   GCP_SERVICE_ACCOUNT_EMAIL: <github-deployer-sa>@cubewizard.iam.gserviceaccount.com
          #   ENQUEUE_SHARED_SECRET_PROD: must match Wrangler ENQUEUE_SHARED_SECRET for --env prod
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build & push enqueue image
        run: |
          docker build \
            -f services/enqueue/Dockerfile \
            -t "${ENQUEUE_IMAGE}:${GITHUB_SHA}" \
            -t "${ENQUEUE_IMAGE}:latest" \
            .
          docker push "${ENQUEUE_IMAGE}:${GITHUB_SHA}"
          docker push "${ENQUEUE_IMAGE}:latest"

      - name: Build & push worker image
        run: |
          docker build \
            -f services/worker/Dockerfile \
            -t "${WORKER_IMAGE}:${GITHUB_SHA}" \
            -t "${WORKER_IMAGE}:latest" \
            .
          docker push "${WORKER_IMAGE}:${GITHUB_SHA}"
          docker push "${WORKER_IMAGE}:latest"

      - name: Deploy worker service
        run: |
          gcloud run deploy "${WORKER_SERVICE}" \
            --project "${PROJECT_ID}" \
            --region "${REGION}" \
            --image "${WORKER_IMAGE}:${GITHUB_SHA}" \
            --service-account "${WORKER_RUNTIME_SA}" \
            --no-allow-unauthenticated \
            --concurrency 1 \
            --timeout 1800 \
            --max-instances 5 \
            --update-env-vars "FIRESTORE_DATABASE_ID=${FIRESTORE_DATABASE_ID},FIRESTORE_COLLECTION=${FIRESTORE_COLLECTION}"

      - name: Get worker URL
        id: worker_url
        run: |
          URL="$(gcloud run services describe "${WORKER_SERVICE}" --project "${PROJECT_ID}" --region "${REGION}" --format='value(status.url)')"
          echo "url=${URL}" >> "$GITHUB_OUTPUT"

      - name: Deploy enqueue service
        run: |
          if [ -z "${{ secrets.ENQUEUE_SHARED_SECRET_PROD }}" ]; then
            echo "Missing GitHub Actions secret: ENQUEUE_SHARED_SECRET_PROD" >&2
            exit 1
          fi
          gcloud run deploy "${ENQUEUE_SERVICE}" \
            --project "${PROJECT_ID}" \
            --region "${REGION}" \
            --image "${ENQUEUE_IMAGE}:${GITHUB_SHA}" \
            --service-account "${ENQUEUE_RUNTIME_SA}" \
            --allow-unauthenticated \
            --set-env-vars "ENQUEUE_SHARED_SECRET=${{ secrets.ENQUEUE_SHARED_SECRET_PROD }},GCP_PROJECT_ID=${PROJECT_ID},GCP_LOCATION=${REGION},CLOUD_TASKS_QUEUE=${CLOUD_TASKS_QUEUE},WORKER_URL=${{ steps.worker_url.outputs.url }}/tasks/eval,TASK_OIDC_SERVICE_ACCOUNT=${TASK_OIDC_SERVICE_ACCOUNT},FIRESTORE_DATABASE_ID=${FIRESTORE_DATABASE_ID},FIRESTORE_COLLECTION=${FIRESTORE_COLLECTION}"

