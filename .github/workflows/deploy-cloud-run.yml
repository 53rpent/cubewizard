name: Deploy Cloud Run services

# `ENQUEUE_SHARED_SECRET` on enqueue is bound from Secret Manager (see GCP_DEPLOYMENT.md).

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

env:
  PROJECT_ID: cubewizard
  REGION: us-east1
  AR_REPO: cubewizard

  ENQUEUE_SERVICE: cubewizard-enqueue
  WORKER_SERVICE: cubewizard-worker

  ENQUEUE_IMAGE: us-east1-docker.pkg.dev/cubewizard/cubewizard/enqueue
  WORKER_IMAGE: us-east1-docker.pkg.dev/cubewizard/cubewizard/worker

  # Runtime service accounts (create these once in GCP IAM).
  # If you choose different emails, update these strings to match.
  ENQUEUE_RUNTIME_SA: enqueue-sa@cubewizard.iam.gserviceaccount.com
  WORKER_RUNTIME_SA: worker-sa@cubewizard.iam.gserviceaccount.com

  # Secret Manager secret id (not the secret value). Runtime SA must have secretAccessor on it.
  ENQUEUE_SECRET_RESOURCE: ENQUEUE_SHARED_SECRET_PROD

  # Prod queue + Firestore upload-status (must match GCP console / docs)
  CLOUD_TASKS_QUEUE: eval-queue
  FIRESTORE_DATABASE_ID: cw-upload-status
  FIRESTORE_COLLECTION: jobs
  TASK_OIDC_SERVICE_ACCOUNT: cloudtasks-invoker-sa@cubewizard.iam.gserviceaccount.com

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # One-time setup required in GCP:
      # - Create a Workload Identity Provider for GitHub OIDC
      # - Create a service account that can push to Artifact Registry + deploy Cloud Run
      # - Grant roles to that service account (see README guidance)
      - name: Authenticate to Google Cloud (OIDC)
        uses: google-github-actions/auth@v2
        with:
          # TODO: set these GitHub repository secrets:
          #   GCP_WORKLOAD_IDENTITY_PROVIDER: projects/<num>/locations/global/workloadIdentityPools/<pool>/providers/<provider>
          #   GCP_SERVICE_ACCOUNT_EMAIL: <github-deployer-sa>@cubewizard.iam.gserviceaccount.com
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build & push enqueue image
        run: |
          docker build \
            -f services/enqueue/Dockerfile \
            -t "${ENQUEUE_IMAGE}:${GITHUB_SHA}" \
            -t "${ENQUEUE_IMAGE}:latest" \
            .
          docker push "${ENQUEUE_IMAGE}:${GITHUB_SHA}"
          docker push "${ENQUEUE_IMAGE}:latest"

      - name: Build & push worker image
        run: |
          docker build \
            -f services/worker/Dockerfile \
            -t "${WORKER_IMAGE}:${GITHUB_SHA}" \
            -t "${WORKER_IMAGE}:latest" \
            .
          docker push "${WORKER_IMAGE}:${GITHUB_SHA}"
          docker push "${WORKER_IMAGE}:latest"

      # Deploy worker before enqueue: new enqueue may emit URL-source tasks (`image_url`);
      # the worker must accept those payloads before enqueue is updated.
      - name: Deploy worker service
        run: |
          gcloud run deploy "${WORKER_SERVICE}" \
            --project "${PROJECT_ID}" \
            --region "${REGION}" \
            --image "${WORKER_IMAGE}:${GITHUB_SHA}" \
            --service-account "${WORKER_RUNTIME_SA}" \
            --no-allow-unauthenticated \
            --concurrency 1 \
            --timeout 1800 \
            --max-instances 5 \
            --update-env-vars "FIRESTORE_DATABASE_ID=${FIRESTORE_DATABASE_ID},FIRESTORE_COLLECTION=${FIRESTORE_COLLECTION}"

      - name: Get worker URL
        id: worker_url
        run: |
          URL="$(gcloud run services describe "${WORKER_SERVICE}" --project "${PROJECT_ID}" --region "${REGION}" --format='value(status.url)')"
          echo "url=${URL}" >> "$GITHUB_OUTPUT"

      # Cloud Run cannot flip ENQUEUE_SHARED_SECRET between plaintext env and Secret Manager in one update.
      # Best-effort clear of either binding before deploy (no-op if already absent).
      - name: Clear existing ENQUEUE_SHARED_SECRET binding (migrate to Secret Manager)
        continue-on-error: true
        run: |
          gcloud run services update "${ENQUEUE_SERVICE}" \
            --project "${PROJECT_ID}" \
            --region "${REGION}" \
            --remove-env-vars=ENQUEUE_SHARED_SECRET \
            --quiet || true
          gcloud run services update "${ENQUEUE_SERVICE}" \
            --project "${PROJECT_ID}" \
            --region "${REGION}" \
            --remove-secrets=ENQUEUE_SHARED_SECRET \
            --quiet || true

      - name: Deploy enqueue service
        run: |
          gcloud run deploy "${ENQUEUE_SERVICE}" \
            --project "${PROJECT_ID}" \
            --region "${REGION}" \
            --image "${ENQUEUE_IMAGE}:${GITHUB_SHA}" \
            --service-account "${ENQUEUE_RUNTIME_SA}" \
            --allow-unauthenticated \
            --update-env-vars "GCP_PROJECT_ID=${PROJECT_ID},GCP_LOCATION=${REGION},CLOUD_TASKS_QUEUE=${CLOUD_TASKS_QUEUE},WORKER_URL=${{ steps.worker_url.outputs.url }}/tasks/eval,TASK_OIDC_SERVICE_ACCOUNT=${TASK_OIDC_SERVICE_ACCOUNT},FIRESTORE_DATABASE_ID=${FIRESTORE_DATABASE_ID},FIRESTORE_COLLECTION=${FIRESTORE_COLLECTION}" \
            --update-secrets "ENQUEUE_SHARED_SECRET=${ENQUEUE_SECRET_RESOURCE}:latest"

      - name: Deploy Cloudflare Worker (production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_KEY }}
          command: "deploy --env prod --config wrangler.jsonc --var CWW_DEPLOY_VERSION:${{ github.sha }}"

      - name: Deploy Cloudflare redirect worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_KEY }}
          command: "deploy --config wrangler-redirect.jsonc"
