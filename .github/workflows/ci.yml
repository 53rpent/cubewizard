name: CI

on:
  pull_request:
    branches: [staging, main]
  push:
    branches: [staging, main]

permissions:
  contents: read
  actions: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Pipeline tests
        run: npm run test:pipeline

      - name: Wrangler config check
        run: npm run wrangler:check
