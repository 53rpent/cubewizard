name: Deploy Cloud Run services (stg)

# `ENQUEUE_SHARED_SECRET` on enqueue-stg is bound from Secret Manager (see GCP_DEPLOYMENT.md / GCP_STAGING.md).

on:
  push:
    branches: [staging]
  workflow_dispatch: {}

env:
  PROJECT_ID: cubewizard
  REGION: us-east1

  ENQUEUE_SERVICE: cubewizard-enqueue-stg
  WORKER_SERVICE: cubewizard-worker-stg

  # Reuse the same Artifact Registry images; only the service names + env differ.
  ENQUEUE_IMAGE: us-east1-docker.pkg.dev/cubewizard/cubewizard/enqueue
  WORKER_IMAGE: us-east1-docker.pkg.dev/cubewizard/cubewizard/worker

  # Runtime service accounts (create these once in GCP IAM).
  ENQUEUE_RUNTIME_SA: enqueue-sa-stg@cubewizard.iam.gserviceaccount.com
  WORKER_RUNTIME_SA: worker-sa-stg@cubewizard.iam.gserviceaccount.com

  ENQUEUE_SECRET_RESOURCE: ENQUEUE_SHARED_SECRET_STG

  # Staging queue + Firestore status DB
  CLOUD_TASKS_QUEUE: eval-queue-stg
  FIRESTORE_DATABASE_ID: cw-upload-status-stg
  FIRESTORE_COLLECTION: jobs

  # Cloud Tasks OIDC invoker identity (must have run.invoker on the worker service)
  TASK_OIDC_SERVICE_ACCOUNT: cloudtasks-invoker-sa-stg@cubewizard.iam.gserviceaccount.com

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy worker service (stg)
        run: |
          gcloud run deploy "${WORKER_SERVICE}" \
            --project "${PROJECT_ID}" \
            --region "${REGION}" \
            --image "${WORKER_IMAGE}:latest" \
            --service-account "${WORKER_RUNTIME_SA}" \
            --no-allow-unauthenticated \
            --concurrency 1 \
            --timeout 1800 \
            --max-instances 5 \
            --update-env-vars "FIRESTORE_DATABASE_ID=${FIRESTORE_DATABASE_ID},FIRESTORE_COLLECTION=${FIRESTORE_COLLECTION}"

      - name: Get worker URL (stg)
        id: worker_url
        run: |
          URL="$(gcloud run services describe "${WORKER_SERVICE}" --project "${PROJECT_ID}" --region "${REGION}" --format='value(status.url)')"
          echo "url=${URL}" >> "$GITHUB_OUTPUT"

      - name: Clear existing ENQUEUE_SHARED_SECRET binding (migrate to Secret Manager)
        continue-on-error: true
        run: |
          gcloud run services update "${ENQUEUE_SERVICE}" \
            --project "${PROJECT_ID}" \
            --region "${REGION}" \
            --remove-env-vars=ENQUEUE_SHARED_SECRET \
            --quiet || true
          gcloud run services update "${ENQUEUE_SERVICE}" \
            --project "${PROJECT_ID}" \
            --region "${REGION}" \
            --remove-secrets=ENQUEUE_SHARED_SECRET \
            --quiet || true

      - name: Deploy enqueue service (stg)
        run: |
          gcloud run deploy "${ENQUEUE_SERVICE}" \
            --project "${PROJECT_ID}" \
            --region "${REGION}" \
            --image "${ENQUEUE_IMAGE}:latest" \
            --service-account "${ENQUEUE_RUNTIME_SA}" \
            --allow-unauthenticated \
            --update-env-vars "GCP_PROJECT_ID=${PROJECT_ID},GCP_LOCATION=${REGION},CLOUD_TASKS_QUEUE=${CLOUD_TASKS_QUEUE},WORKER_URL=${{ steps.worker_url.outputs.url }}/tasks/eval,TASK_OIDC_SERVICE_ACCOUNT=${TASK_OIDC_SERVICE_ACCOUNT},FIRESTORE_DATABASE_ID=${FIRESTORE_DATABASE_ID},FIRESTORE_COLLECTION=${FIRESTORE_COLLECTION}" \
            --update-secrets "ENQUEUE_SHARED_SECRET=${ENQUEUE_SECRET_RESOURCE}:latest"

      - name: Deploy Cloudflare Worker (staging)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_KEY }}
          command: "deploy --env stg --config wrangler.jsonc --var CWW_DEPLOY_VERSION:${{ github.sha }}"
